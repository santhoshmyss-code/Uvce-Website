<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slideshow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            
        }
        .slideshow-container {
            position: relative;
            max-width: 100%;
            height: 500px;
            overflow: hidden;
            margin: auto;
        }
        .slides {
            display: none;
            width: 100%;
            height: 100%;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .content {
            padding: 20px;
        }
        .button-container {
            margin: 20px;
        }
        .btn {
            padding: 10px 20px;
            font-size: 18px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <main>
    <div class="slideshow-container">
        <img class="slides" src="image/img1.jpg" alt="Slide 1">
        <img class="slides" src="image/img2.jpg" alt="Slide 2">
        <img class="slides" src="image/img3.jpg" alt="Slide 3">
    </div>

    <div class="content">
        <h2>Welcome to Our Website</h2>
        <p>Here you can find all the latest updates and information.</p>
    </div>

    <div class="button-container">
        <button class="btn" onclick="showTimeTable()">Time Table</button>
    </div>
    </main>

    <script>
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slides");
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 3000);
        }
        showSlides();
        
        function showTimeTable() {
            alert("Time Table Clicked!");
        }
    </script>
</body>
</html>
